name: Custom lint

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  run-lint:
    name: Run lint
    runs-on: [ self-hosted, Linux, X64, gcp-custom-runners ]
    container: antmicro/centos-dev-tools
    env:
      GHA_EXTERNAL_DISK: additional-tools-all
      GHA_SA: gh-sa-veer-uploader
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Run lint
        run: _secret_lint:12
